name: proxy-nginx

on:
  push:
    branches:
      - main
    paths:
      - '.github/workflows/proxy-nginx.yml'
      - 'containers/proxy-nginx/**'

  pull_request:
    branches: [ "main" ]
    paths:
      - 'containers/proxy-nginx/**'

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout source code
        uses: actions/checkout@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v4
        with:
          images: shepherd9664/proxy-nginx
          tags: |
            type=raw,value=1.27.1-{{date 'YYYY.MM.DD' tz='Asia/Seoul'}}
            type=raw,value=1.27.1-{{sha}}
            type=raw,value=latest

      - name: Login to DockerHub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and Push
        uses: docker/build-push-action@v4
        with:
          context: ./containers/proxy-nginx
          file: containers/proxy-nginx/Dockerfile
          platforms: linux/amd64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
